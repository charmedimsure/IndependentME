<style>
/* ============================================================
   Care side. Deliberately the tablet's opposite: quiet, dark,
   dense, built for glancing at one-handed. Same type family so
   it still reads as one product.
   ============================================================ */
:root{
  --display:'Bricolage Grotesque',system-ui,sans-serif;
  --body:'Figtree',system-ui,-apple-system,sans-serif;
  --bg:#14161C; --panel:#1D2029; --panel-2:#252936;
  --ink:#EDEFF5; --soft:#8E95A8; --line:rgba(255,255,255,.09);
  --ok:#3ECF7C; --warn:#F2B33D; --miss:#E8604C; --amber:#F4C77E;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--body);padding-bottom:110px}
button{font-family:inherit;color:inherit;border:0;background:none;cursor:pointer}
h1,h2,h3{font-family:var(--display);font-weight:800;letter-spacing:-.02em;margin:0}
.wrap{max-width:620px;margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) 16px 0}
.hide{display:none!important}

.top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:22px}
.top h1{font-size:28px}
.top .st{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--miss);margin-right:6px;vertical-align:middle}
.dot.on{background:var(--ok)}

.panel{background:var(--panel);border-radius:18px;padding:18px;margin-bottom:14px}
.panel h3{font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--soft);margin-bottom:16px}

/* progress ring */
.summary{display:flex;align-items:center;gap:20px}
.ring{width:92px;height:92px;flex:none;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .bg{stroke:var(--panel-2);stroke-width:9;fill:none}
.ring .fg{stroke:var(--ok);stroke-width:9;fill:none;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.ring b{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--display);font-size:25px}
.summary .txt{font-size:15px;color:var(--soft);font-weight:600;line-height:1.5}
.summary .txt b{display:block;font-family:var(--display);font-size:22px;color:var(--ink);margin-bottom:4px}

.trow{display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid var(--line)}
.trow:last-child{border-bottom:0}
.tico{width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:22px;background:var(--panel-2);overflow:hidden}
.tico img{width:100%;height:100%;object-fit:cover}
.tmain{flex:1;min-width:0}
.tname{font-weight:800;font-size:16px}
.tsub{font-size:12.5px;color:var(--soft);font-weight:600;margin-top:2px}
.tstat{font-size:12px;font-weight:800;padding:6px 11px;border-radius:20px;white-space:nowrap}
.s-ok{background:rgba(62,207,124,.15);color:var(--ok)}
.s-wait{background:rgba(255,255,255,.06);color:var(--soft)}
.s-late{background:rgba(232,96,76,.15);color:var(--miss)}

/* week grid */
.week{display:grid;grid-template-columns:1fr repeat(7,26px);gap:5px;align-items:center;font-size:11px}
.week .h{color:var(--soft);font-weight:800;text-align:center;text-transform:uppercase;letter-spacing:.04em}
.week .lbl{font-weight:700;font-size:12.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:6px}
.cell{height:26px;border-radius:7px;background:var(--panel-2)}
.cell.y{background:var(--ok)}
.cell.n{background:rgba(232,96,76,.28)}
.cell.x{background:transparent;border:1px dashed var(--line)}

/* messages */
.msg{display:flex;gap:11px;margin-bottom:14px;align-items:flex-start}
.msg .b{padding:13px 15px;border-radius:16px;font-size:15.5px;font-weight:600;line-height:1.4;max-width:80%}
.msg.from .b{background:var(--panel-2);border-top-left-radius:5px}
.msg.to{flex-direction:row-reverse}
.msg.to .b{background:var(--amber);color:#22201C;border-top-right-radius:5px}
.msg .av{font-size:26px;line-height:1;padding-top:4px}
.msg .when{font-size:11px;color:var(--soft);font-weight:700;margin-top:5px}
.unseen{box-shadow:0 0 0 2px var(--amber)}
.quick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.quick button{padding:9px 13px;border-radius:20px;border:1px solid var(--line);font-size:14px;font-weight:700}

/* forms */
label.f{display:block;font-size:11.5px;font-weight:800;color:var(--soft);margin:16px 0 7px;text-transform:uppercase;letter-spacing:.09em}
input,select,textarea{width:100%;padding:13px;font:inherit;font-size:16px;color:var(--ink);background:var(--panel-2);border:1px solid var(--line);border-radius:12px}
input:focus,select:focus,textarea:focus{outline:2px solid var(--amber);outline-offset:1px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:13px;font-weight:800;font-size:15.5px;background:var(--amber);color:#22201C;width:100%}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn.bad{background:rgba(232,96,76,.16);color:var(--miss)}
.row{display:flex;gap:9px}
.chip{padding:11px;border-radius:11px;border:1px solid var(--line);font-weight:800;font-size:14px;flex:1;text-align:center;color:var(--soft)}
.chip[aria-pressed="true"]{background:var(--amber);color:#22201C;border-color:var(--amber)}
.emojis{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.emojis button{width:42px;height:42px;border-radius:11px;border:1px solid var(--line);font-size:21px}
.emojis button[aria-pressed="true"]{background:var(--panel-2);border-color:var(--amber)}
.note{font-size:12.5px;color:var(--soft);line-height:1.6;font-weight:600}
.empty{text-align:center;color:var(--soft);font-weight:600;padding:34px 10px;font-size:14.5px}

.bar{position:fixed;left:0;right:0;bottom:0;background:rgba(20,22,28,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:9px 12px calc(9px + env(safe-area-inset-bottom))}
.bar-in{max-width:620px;margin:0 auto;display:flex}
.tab{flex:1;padding:9px 4px;display:grid;place-items:center;gap:4px;font-size:11px;font-weight:800;color:var(--soft);position:relative}
.tab em{font-style:normal;font-size:20px}
.tab{font-size:10.5px}
.tab[aria-current="true"]{color:var(--amber)}
.tab .bdg{position:absolute;top:2px;right:calc(50% - 24px);min-width:19px;height:19px;border-radius:10px;background:var(--miss);color:#fff;font-size:11px;display:grid;place-items:center;padding:0 5px}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
.pic svg,.tico svg,.spic svg,.oitem .pic svg,.emojis svg,.apic svg{width:62%;height:62%;color:currentColor}
.spic svg{width:58%;height:58%}

.installbar{position:fixed;left:12px;right:12px;bottom:84px;z-index:55;background:var(--amber);color:#22201C;
  border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 14px 34px rgba(0,0,0,.45)}
.installbar b{font-family:'Bricolage Grotesque',sans-serif;font-size:16px;display:block}
.installbar span{font-size:12.5px;font-weight:700;opacity:.75}
.installbar .go{background:#22201C;color:var(--amber);border-radius:12px;padding:11px 16px;font-weight:800;font-size:14px;flex:none}
.installbar .x{background:transparent;color:#22201C;font-size:20px;padding:6px 4px;opacity:.55;flex:none}

.ring{position:fixed;inset:0;z-index:75;background:#14161C;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;padding:28px;text-align:center}
.ring .who{font-family:'Bricolage Grotesque',sans-serif;font-size:38px;font-weight:800;color:#EDEFF5}
.ring .sub{color:#8E95A8;font-weight:700}
.ring .btns{display:flex;gap:16px;margin-top:14px}
.ring .ans{background:#3ECF7C;color:#08210F;border-radius:40px;padding:20px 34px;font-weight:800;font-size:19px}
.ring .dec{background:#E8604C;color:#fff;border-radius:40px;padding:20px 34px;font-weight:800;font-size:19px}
</style>
</head>
<body>

<div class="wrap">
  <div class="top">
    <h1 id="pageTitle">Today</h1>
    <div class="st"><span class="dot" id="conn"></span><span id="connTxt">offline</span></div>

<nav class="bar"><div class="bar-in">

  <button class="tab" data-tab="week"><em>▦</em>Week</button>
  <button class="tab" data-tab="msgs"><em>💬</em>Messages<span class="bdg hide" id="bdg">0</span></button>
  <button class="tab" data-tab="plan"><em>✎</em>Her plan</button>
  <button class="tab" data-tab="setup"><em>⚙</em>Setup</button>
</div></nav>

<style>
.checkin{display:flex;gap:10px;margin-bottom:14px}
.checkin button{flex:1;padding:15px;border-radius:14px;font-weight:800;font-size:15px}
.ci-ask{background:var(--amber);color:#22201C}
.ci-call{background:var(--mark,#3B6BE8);color:#fff;background:#3B6BE8}
.shots{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
.shot{border-radius:14px;overflow:hidden;background:var(--panel-2);aspect-ratio:3/4;position:relative;border:0;padding:0}
.shot img{width:100%;height:100%;object-fit:cover}
.shot .t{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.75));
  color:#fff;font-size:10.5px;font-weight:800;padding:14px 5px 5px}
.lightbox{position:fixed;inset:0;background:rgba(10,11,14,.96);z-index:60;display:grid;place-items:center;padding:20px}
.lightbox img{max-width:100%;max-height:80vh;border-radius:14px}
.callwrap{position:fixed;inset:0;background:#0E1016;z-index:70;display:flex;flex-direction:column}
.callwrap video{width:100%;height:100%;object-fit:cover;background:#0E1016}
.callwrap .far{flex:1;min-height:0}
.callwrap .near{position:absolute;right:14px;top:calc(14px + env(safe-area-inset-top));width:104px;height:142px;
  border-radius:14px;overflow:hidden;border:2px solid rgba(255,255,255,.25)}
.callwrap .st{position:absolute;left:0;right:0;top:45%;text-align:center;color:#fff;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px}
.callwrap .bar{position:absolute;left:0;right:0;bottom:0;padding:20px calc(20px + env(safe-area-inset-bottom));display:flex;justify-content:center}
.callwrap .hang{background:var(--miss);color:#fff;border-radius:40px;padding:17px 40px;font-weight:800;font-size:18px}
</style>
<div class="installbar hide" id="installbar">
  <div style="flex:1"><b>Add Care to your phone</b><span>Opens like an app, no browser bar</span></div>
  <button class="go" id="ibGo">Add</button>
  <button class="x" id="ibNo">✕</button>
</div>
<div class="lightbox hide" id="lightbox"></div>
<div class="ring hide" id="ring"></div>
<div class="callwrap hide" id="callwrap"></div>
<script>
/* ============================================================
   Drawn icons for things emoji has no answer for. A towel is not
   toilet paper and a sweater is not a ball of yarn; at her level
   the picture has to be the right object, not a near miss.
   Used anywhere an icon value starts with "svg:".
   ============================================================ */
const SVGI = {
  pad:'<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><rect x="22" y="10" width="20" height="44" rx="10"/><path d="M22 24c-8 0-10 6-4 10 6-4 4-10 4-10z"/><path d="M42 24c8 0 10 6 4 10-6-4-4-10-4-10z"/><path d="M32 18v28"/></svg>',
  can:'<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><rect x="20" y="10" width="24" height="44" rx="6"/><path d="M20 20h24M20 44h24"/><path d="M28 14h8"/></svg>',
  towel:'<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 10h32a6 6 0 0 1 6 6v38a4 4 0 0 1-4 4H18a6 6 0 0 1-6-6V16a6 6 0 0 1 4-5.7z"/><path d="M16 10a6 6 0 0 0 0 12h8V10"/><path d="M22 32h20M22 40h20"/></svg>',
  sweater:'<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M24 10h16l12 7-5 11-5-2.5V54H22V25.5L17 28l-5-11z"/><path d="M24 10c0 4.5 3.6 7 8 7s8-2.5 8-7"/><path d="M22 46h20"/></svg>',
  toothbrush:'<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 54 44 22"/><path d="M40 10l12 9-8 11-12-9z"/><path d="M18 50l-4 6 7-2z"/></svg>',
  hairbrush:'<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><rect x="20" y="8" width="24" height="26" rx="12"/><path d="M28 38v14a4 4 0 0 0 8 0V38"/><path d="M26 16v6M32 14v8M38 16v6"/></svg>',
  soap:'<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><rect x="10" y="30" width="44" height="22" rx="8"/><path d="M18 30c0-7 6-11 14-11s14 4 14 11"/><circle cx="24" cy="14" r="4"/><circle cx="38" cy="9" r="3"/></svg>',
  shirt:'<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M24 9h16l14 8-6 12-6-3v28H22V26l-6 3-6-12z"/><path d="M24 9c0 4 3.6 6.5 8 6.5S40 13 40 9"/></svg>'
};
const icoHTML = v => (v && String(v).startsWith('svg:'))
  ? (SVGI[String(v).slice(4)] || '')
  : (v || '');

const LS={
  get(k,d){ try{const v=localStorage.getItem('imec.'+k); return v?JSON.parse(v):d;}catch(e){return d;} },
  set(k,v){ try{localStorage.setItem('imec.'+k,JSON.stringify(v));}catch(e){} }
};
let API=LS.get('api',''), HOUSE=LS.get('house',''), CARE=LS.get('care',''), ME=LS.get('me','');

/* An invite link fills all of this in, so nobody has to type a worker URL.
   Format: care.html#api=...&house=...&care=...&me=Nan */
(function(){
  if(!location.hash) return;
  const q={}; location.hash.slice(1).split('&').forEach(kv=>{
    const [k,v]=kv.split('='); if(k) q[k]=decodeURIComponent(v||'');
  });
  if(q.api){ API=q.api; LS.set('api',API); }
  if(q.house){ HOUSE=q.house; LS.set('house',HOUSE); }
  if(q.care){ CARE=q.care; LS.set('care',CARE); }
  if(q.me){ ME=q.me; LS.set('me',ME); }
  history.replaceState(null,'',location.pathname);
})();
let CFG=LS.get('config',null), DONE=[], MSGS=[], WEEK=[], PHOTOS=[];
let draftReply='';
let pendingRender=false;
let online=false, tab='today', lastCount=0;
let sub=null, room=null;
let HANDLED_CALLS=LS.get('handledCalls',{}), incoming=null;
let savedAt=LS.get('savedAt',0), saving=false, TIDY=false;
let loaded=false;   // true once we've actually seen the household's setup
let secKey=null;    // which settings screen is open

const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const D3=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const key=d=>{d=d||new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const mins=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
const pretty=t=>{let[h,m]=t.split(':').map(Number);const ap=h<12?'am':'pm';h=h%12||12;return h+':'+String(m).padStart(2,'0')+ap;};
const clock=ms=>{const d=new Date(ms);let h=d.getHours()%12||12;return h+':'+String(d.getMinutes()).padStart(2,'0')+(d.getHours()<12?'am':'pm');};
function careFree(p){
  if(p.override==='free') return true;
  if(p.override==='busy') return false;
  const b=p.busy; if(!b||!(b.days||[]).length) return true;
  const now=new Date(); if(!b.days.includes(now.getDay())) return true;
  const cur=now.getHours()*60+now.getMinutes();
  return cur<mins(b.from)||cur>=mins(b.to);
}
function awayWin(){
  const dow=new Date().getDay(), k=key();
  const e=((CFG&&CFG.events)||[]).find(x=>x.away&&x.from&&x.to&&(x.kind==='date'?x.date===k:(x.days||[]).includes(dow)));
  return e?{from:mins(e.from),to:mins(e.to),title:e.title}:null;
}
function effT(t){
  const w=awayWin(), m=mins(t.time);
  return (w&&m>=w.from&&m<w.to) ? w.to+5 : m;
}
const _todayISO=()=>new Date().toISOString().slice(0,10);
const dueOn=(t,dow)=>t.freq==='daily'||(t.freq==='weekly'&&(t.days||[]).includes(dow))||(t.freq==='once'&&t.date && t.date<=_todayISO());

let blankIds={};
const blank=()=>({
  name:'', ntfy:'', snoozeMinutes:10, maxSnoozes:3, helpFallbackMinutes:10, nudgeTo:'primary', speechRate:0.8, keepDays:30, showWholeDay:false,
  quietFrom:'21:30', quietTo:'07:00',
  rewardOn:true, rewardNeed:0, weekNeedDays:7,
  period:{ active:false, startedOn:null, log:[], everyHours:3, fromHour:8, toHour:21, useSteps:true,
    steps:[
      {id:uid(),icon:'🚽',       label:'Go to the bathroom'},
      {id:uid(),icon:'svg:pad',  label:'Take off the old pad'},
      {id:uid(),icon:'🗑️',       label:'Wrap it up and put it in the trash'},
      {id:uid(),icon:'svg:pad',  label:'Put a fresh pad on'},
      {id:uid(),icon:'🧼',       label:'Wash your hands'}
    ]},
  rewards:[
    {id:uid(),name:'Orange Crush',  icon:'svg:can',photo:null,ok:true,tier:'day'},
    {id:uid(),name:'Kit Kat',       icon:'🍫',photo:null,ok:true,tier:'day'},
    {id:uid(),name:'Kinder egg',    icon:'🥚',photo:null,ok:true,tier:'day'},
    {id:uid(),name:'Chipotle',      icon:'🌯',photo:null,ok:true,tier:'week'}
  ],
  events:[
    {id:uid(),title:'Day service',icon:'🚐',photo:null,kind:'weekly',days:[2,3,4],from:'08:45',to:'15:00',warn:20,big:true,away:true,
     items:[{icon:'🎨',label:'activities'},{icon:'🍽️',label:'lunch there'}],note:'Home by three.'}
  ],
  lat:39.7137, lon:-82.5993, place:'Lancaster, Ohio',
  wardrobe:[
    {id:uid(),name:'Warm coat',       icon:'🧥',photo:null,layer:'outer', minF:-20,maxF:48, rain:false},
    {id:uid(),name:'Sweater',         icon:'svg:sweater',photo:null,layer:'outer', minF:40, maxF:65, rain:false},
    {id:uid(),name:'Raincoat',        icon:'☔',photo:null,layer:'outer', minF:33, maxF:120,rain:true},
    {id:uid(),name:'T-shirt',         icon:'svg:shirt',photo:null,layer:'top',   minF:62, maxF:120,rain:false},
    {id:uid(),name:'Long sleeves',    icon:'👚',photo:null,layer:'top',   minF:-20,maxF:68, rain:false},
    {id:uid(),name:'Shorts',          icon:'🩳',photo:null,layer:'bottom',minF:70, maxF:120,rain:false},
    {id:uid(),name:'Pants',           icon:'👖',photo:null,layer:'bottom',minF:-20,maxF:78, rain:false},
    {id:uid(),name:'Sneakers',        icon:'👟',photo:null,layer:'feet',  minF:34, maxF:120,rain:false},
    {id:uid(),name:'Boots',           icon:'🥾',photo:null,layer:'feet',  minF:-20,maxF:46, rain:false},
    {id:uid(),name:'Sandals',         icon:'🩴',photo:null,layer:'feet',  minF:78, maxF:120,rain:false},
    {id:uid(),name:'Hat and gloves',  icon:'🧤',photo:null,layer:'extra', minF:-20,maxF:33, rain:false},
    {id:uid(),name:'Umbrella',        icon:'☂️',photo:null,layer:'extra', minF:33, maxF:120,rain:true}
  ],
  tasks:[
    {id:uid(),name:'Brush teeth',icon:'🪥',photo:null,time:'07:30',freq:'daily',days:[],timer:180},
    {id:uid(),name:'Brush hair',icon:'💇',photo:null,time:'07:45',freq:'daily',days:[]},

/* ---------- network ---------- */
async function post(path,body){
  const r=await fetch(API.replace(/\/$/,'')+path,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(Object.assign({house:HOUSE,care:CARE},body))
  });
  const j=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
  return j;
}

async function pull(){
  if(!API||!HOUSE){ setConn(false); return; }
  try{
    const base=API.replace(/\/$/,'');
    const r=await fetch(base+'/pull?house='+encodeURIComponent(HOUSE)+'&day='+key());
    if(!r.ok) throw 0;
    const d=await r.json();

    if(d.config) loaded=true;
    if(d.config && (d.config.contacts||[]).length) snapshot(d.config, d.updated);
    // Only adopt the server's copy if it's at least as new as our last save and
    // nothing is being edited. A refresh must never eat work in progress.
    if(d.config && !saving && !sub && (d.updated||0) >= savedAt){
      CFG=d.config; LS.set('config',CFG);
      savedAt=d.updated||savedAt; LS.set('savedAt',savedAt);
    }

    DONE=d.done||[]; PHOTOS=d.photos||[];
    const prev=MSGS.filter(m=>m.dir==='out').length;
    MSGS=d.messages||MSGS;
    setConn(true);   // the main data is in; we're connected regardless of what follows

    // Karelynn ringing us
    const call=MSGS.filter(m=>m.dir==='call' && !HANDLED_CALLS[m.id] && Date.now()-m.at < 120000).pop();
    if(call && !room && !incoming){
      const [rm,from]=String(call.body).split('|');
      incoming={id:call.id, room:rm, from:from||'Karelynn'};
      const ringEl=document.getElementById('ring');
      if(ringEl) ringEl.innerHTML=
        `<div style="font-size:64px">📹</div>
         <div class="who">${esc(incoming.from)}</div>
         <div class="sub">is calling you</div>
         <div class="btns"><button class="dec" id="ringNo">Decline</button>
         <button class="ans" id="ringYes">Answer</button></div>`;
      if(ringEl) ringEl.classList.remove('hide');
      if('Notification' in window && Notification.permission==='granted'){
        try{ new Notification(incoming.from+' is calling',{body:'Open Care to answer',tag:'call'+call.id}); }catch(e){}
      }
    }

    const now=MSGS.filter(m=>m.dir==='out').length;
    if(now>prev && lastCount>0) ping();
    lastCount=now;

    // The weekly log is a nice-to-have. If it fails, stay connected.
    try{
      const from=new Date(); from.setDate(from.getDate()-6);
      const w=await fetch(base+'/week?house='+encodeURIComponent(HOUSE)+'&from='+key(from));
      if(w.ok) WEEK=(await w.json()).log||WEEK;
    }catch(_){}
  }catch(e){ setConn(false); }
  render();
}

function setConn(v){
  online=v;
  document.getElementById('conn').classList.toggle('on',v);
  document.getElementById('connTxt').textContent = v?'connected':(API?'offline':'not set up');
}

function ping(){
  if('Notification' in window && Notification.permission==='granted'){
    const m=MSGS.filter(x=>x.dir==='out').slice(-1)[0];
    if(m) try{ new Notification('Message from '+((CFG&&CFG.name)||'home'),{body:m.body,tag:'c'+m.id}); }catch(e){}
  }
}

/* ---------- views ---------- */
function render(){
  /* Never redraw the screen out from under someone who is typing. The refresh
     runs every fifteen seconds, which is exactly long enough to lose a
     sentence halfway through. */
  const a=document.activeElement;
  const typing = a && (a.tagName==='TEXTAREA' || a.tagName==='INPUT' || a.isContentEditable);
  if(typing){ pendingRender=true; return; }
  pendingRender=false;

  document.getElementById('pageTitle').textContent =
    {today:'Today',week:'This week',msgs:'Messages',plan:'Her plan',setup:'Setup'}[tab];
  const unread=MSGS.filter(m=>(m.dir==='out'||m.dir==='alert')&&!m.seen).length;
  const b=document.getElementById('bdg');
  b.textContent=unread; b.classList.toggle('hide',unread===0);
  document.querySelectorAll('.tab').forEach(x=>x.setAttribute('aria-current',x.dataset.tab===tab));
  ({today:viewToday,week:viewWeek,msgs:viewMsgs,plan:viewPlan,setup:viewSetup}[tab])();
  if(tab==='msgs') loadShots();
}

function viewToday(){
  const el=document.getElementById('view');
  if(!CFG){ el.innerHTML=`<div class="panel"><div class="empty">Not connected yet. Open Setup, then Advanced.</div></div>`; return; }
  const dow=new Date().getDay();
  const list=(CFG.tasks||[]).filter(t=>dueOn(t,dow)).sort((a,b)=>mins(a.time)-mins(b.time));
  const doneMap={}; DONE.forEach(d=>doneMap[d.id]=d.at);
  const nowM=new Date().getHours()*60+new Date().getMinutes();
  const n=list.filter(t=>doneMap[t.id]).length;
  const pct=list.length?n/list.length:0;
  const C=2*Math.PI*40;
  const late=list.filter(t=>!doneMap[t.id]&&mins(t.time)<nowM-30).length;

  el.innerHTML=`
  <div class="panel"><div class="summary">
    <div class="ring"><svg width="92" height="92" viewBox="0 0 92 92">
      <circle class="bg" cx="46" cy="46" r="40"/>
      <circle class="fg" cx="46" cy="46" r="40" stroke-dasharray="${C}" stroke-dashoffset="${C*(1-pct)}"/>
    </svg><b>${n}/${list.length}</b></div>
    <div class="txt"><b>${DAYS[dow]}</b>${
      !list.length?'Nothing scheduled today.'
      : n===list.length?'Everything is done. Nice day.'
      : late ? late+' past due, '+(list.length-n)+' left overall.'
      : (list.length-n)+' still to go, nothing overdue.'}</div>
  </div></div>

  <div class="panel"><h3>The list</h3>${
    list.length? list.map(t=>{
      const at=doneMap[t.id];
      const isLate=!at && mins(t.time)<nowM-30;
      return `<div class="trow">
        <div class="tico">${t.photo?`<img src="${t.photo}">`:icoHTML(t.icon)}</div>
        <div class="tmain"><div class="tname">${esc(t.name)}</div>
          <div class="tsub">${pretty(t.time)}${t.freq==='weekly'?' · weekly':t.freq==='once'?' · just once':''}${t.timer?' · ⏱ '+Math.round(t.timer/60)+'m':''}</div></div>
        <div class="tstat ${at?'s-ok':isLate?'s-late':'s-wait'}">${at?'✓ '+clock(at):isLate?'past due':'waiting'}</div>
      </div>`;
    }).join('') : '<div class="empty">Nothing scheduled today.</div>'}
  </div>`;
}

function viewWeek(){
  const el=document.getElementById('view');
  if(!CFG){ el.innerHTML=`<div class="panel"><div class="empty">Connect in Setup first.</div></div>`; return; }
  const days=[]; for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); days.push(d); }
  const map={}; WEEK.forEach(r=>{ map[r.day+'|'+r.task_id]=true; });
  const nowKey=key();

  el.innerHTML=`<div class="panel"><h3>Last 7 days</h3>
    <div class="week">
      <div></div>${days.map(d=>`<div class="h">${D3[d.getDay()][0]}</div>`).join('')}
      ${(CFG.tasks||[]).map(t=>`<div class="lbl">${esc(t.name)}</div>`+
        days.map(d=>{
          const k=key(d);
          if(!dueOn(t,d.getDay())) return `<div class="cell x"></div>`;
          if(map[k+'|'+t.id]) return `<div class="cell y"></div>`;
          return `<div class="cell ${k===nowKey?'':'n'}"></div>`;
        }).join('')).join('')}
    </div>
    <p class="note" style="margin-top:16px">Green is done. Red is a day it was scheduled and not checked off. Dashed means it wasn't on the list that day. Today's blanks are just not-yet.</p>
  </div>`;
}

async function loadShots(){
  for(const ph of PHOTOS){
    const el=document.querySelector(`[data-photo="${ph.id}"]`);
    if(!el || el.querySelector('img')) continue;
    try{
      const r=await fetch(API.replace(/\/$/,'')+'/photo-get?house='+encodeURIComponent(HOUSE)+'&id='+ph.id);
      const d=await r.json();
      const img=new Image(); img.src=d.data; el.prepend(img);
    }catch(e){}
  }
}

    <button class="btn" style="margin-top:16px" id="saveRules">Save</button>
    <p class="note" style="margin-top:10px">After the last one, "Not yet" is replaced with "I need help", which messages you. The alarm never gets louder or scolds her; it hands her to a person instead.</p>
  </div><div class="panel"><h3>What she sees</h3>
    <div class="row"><button class="chip" id="sWhole" aria-pressed="${!!(CFG&&CFG.showWholeDay)}">${(CFG&&CFG.showWholeDay)?'The whole day at once':'Only what it is time for'}</button></div>
    <p class="note" style="margin-top:10px">By default a task appears when its time arrives, not before. The arc across the top of her screen still shows the whole day as dots, so she can see what is coming without being handed a button she should not press yet.</p>
    <button class="btn" style="margin-top:14px" id="saveWhole">Save</button>
  </div><div class="panel"><h3>Quiet hours</h3>
    <p class="note" style="margin-bottom:12px">Nothing rings between these times, so the tablet never wakes her. Reminders wait for morning.</p>
    <div class="row">
      <div style="flex:1"><label class="f">Bedtime</label>
        <input type="time" id="sQuietFrom" value="${(CFG&&CFG.quietFrom)||'21:30'}"></div>
      <div style="flex:1"><label class="f">Wake up</label>
        <input type="time" id="sQuietTo" value="${(CFG&&CFG.quietTo)||'07:00'}"></div>
    </div>
    <button class="btn" style="margin-top:16px" id="saveQuiet">Save</button>
  </div><div class="panel"><h3>Her name</h3>
    <input id="sName" value="${esc((CFG&&CFG.name)||'')}" placeholder="Karelynn">
    <label class="f">How fast she's spoken to</label>
    <select id="sRate">${[[0.6,'Very slow'],[0.7,'Slow'],[0.8,'Steady'],[0.9,'Normal']].map(([v,l])=>`<option value="${v}" ${((CFG&&CFG.speechRate)||0.8)===v?'selected':''}>${l}</option>`).join('')}</select>
    <p class="note" style="margin-top:8px">Hearing loss is common with Down syndrome and often goes unnoticed. If she asks people to repeat things, slow this down and check the tablet volume.</p>

    <label class="f">Keep messages for</label>
    <select id="sKeep">
      <option value="0" ${!(CFG&&CFG.keepDays)?'selected':''}>Forever</option>
      ${[7,30,90].map(n=>`<option value="${n}" ${(CFG&&CFG.keepDays)===n?'selected':''}>${n} days</option>`).join('')}
    </select>
    <p class="note" style="margin-top:8px">Anything older is tidied away on its own overnight. Photos go with it.</p>

    <label class="f">Phone alerts (ntfy topic)</label>
    <input id="sNtfy" value="${esc((CFG&&CFG.ntfy)||'')}" placeholder="karelynn-msgs-9x4f" autocapitalize="off" spellcheck="false">
    <p class="note" style="margin-top:8px">Install the free ntfy app, subscribe to this exact topic, and her messages buzz your phone even when this app is closed. Leave blank to skip.</p>
    <button class="btn" style="margin-top:14px" id="saveName">Save</button>
  </div>`;
    case 'people': return `<div class="panel"><h3>People she can message</h3>
    ${(CFG&&CFG.contacts||[]).length && !(CFG.contacts||[]).some(c=>c.fallback)
      ? `<div style="background:rgba(242,179,61,.14);color:var(--warn);border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:13.5px;font-weight:700;line-height:1.5">
           Nobody is marked <b>always shown</b>. During everyone's busy hours she'd be offered whoever is left, which may not be who you'd want. Open your own entry and turn it on.</div>`
      : ''}
    ${(CFG&&CFG.contacts||[]).some(c=>c.fallback && !careFree(c))
      ? `<div class="note" style="margin-bottom:12px">Someone marked always shown is inside their busy hours right now. She'll still see them.</div>` : ''}
    ${(CFG&&CFG.contacts||[]).map(c=>`
      <div class="trow"><div class="tico" style="border-radius:50%">${c.photo?`<img src="${c.photo}">`:icoHTML(c.icon)}</div>
      <div class="tmain"><div class="tname">${esc(c.name)}</div>
        <div class="tsub">${careFree(c)?'available now':'not available now'}${c.fallback?' · always shown':''}${c.ntfy?'':' · no alerts set up'}</div></div>
      <button class="tstat s-wait" data-econ="${c.id}">edit</button></div>`).join('')
      || '<div class="empty">No people yet. Add at least one so the Messages tab works on her tablet.</div>'}
    <button class="btn ghost" style="margin-top:14px" data-econ="new">+ Add a person</button>
  </div>`;
    case 'phone': return `<div class="panel"><h3>Who you are on this device</h3>
    <select id="sMe">
      <option value="">— pick yourself —</option>
      ${(CFG&&CFG.contacts||[]).map(c=>`<option value="${esc(c.name)}" ${ME===c.name?'selected':''}>${esc(c.name)}</option>`).join('')}
    </select>
    <button class="btn" style="margin-top:14px" id="saveMe">Save</button>
    <p class="note" style="margin-top:10px">This is the name on your replies. Everyone shares one caregiver key, so this is a name tag rather than a login — fine among the four of you, worth knowing anyway.</p>
    
  </div><div class="panel"><h3>This phone</h3>
    <button class="btn ghost" id="askNotif">Turn on notifications</button>
    <button class="btn ghost" style="margin-top:10px" id="testPush">Send a test notification to everyone</button>
    <p class="note" id="pushOut" style="margin-top:10px;white-space:pre-wrap"></p>
    <button class="btn ghost" style="margin-top:10px" id="installApp">Add to the home screen</button>
    <button class="btn ghost" style="margin-top:10px" id="forceUpdate">Get the newest version</button>
    <p class="note" style="margin-top:10px">Version 2026-07-22-b</p>
  </div>`;
    case 'advanced': return `<div class="panel"><h3>Connection</h3>
    <p class="note" style="margin-bottom:14px">Filled in by the link you were sent. You should not need to change any of it. Getting these wrong disconnects you from Karelynn.</p>
    <label class="f">Worker address</label>
    <input id="sApi" value="${esc(API)}" placeholder="https://independentme.workers.dev" autocapitalize="off" spellcheck="false">
    <label class="f">Household code</label>
    <input id="sHouse" value="${esc(HOUSE)}" placeholder="karelynn-home" autocapitalize="off" spellcheck="false">
    <label class="f">Caregiver key</label>
    <input id="sCare" value="${esc(CARE)}" placeholder="a long private phrase" autocapitalize="off" spellcheck="false">
    <button class="btn" style="margin-top:16px" id="saveConn">Save and connect</button>
    <p class="note" style="margin-top:10px">The tablet needs the worker address and household code. The caregiver key stays on your phone only, and is what lets this app change things.</p>
  </div><div class="panel"><h3>If something got lost</h3>
    <button class="btn ghost" id="whoBack">Find people from the message history</button>
    <p class="note" id="whoOut" style="margin-top:10px"></p>

    <label class="f">Saved copies on this phone</label>
    ${(LS.get('snaps',[])||[]).length
      ? (LS.get('snaps',[])||[]).map((sn,i)=>`<div class="trow">
          <div class="tmain"><div class="tname">${new Date(sn.at).toLocaleString()}</div>
          <div class="tsub">${sn.people} people · ${sn.tasks} tasks</div></div>
          <button class="tstat s-ok" data-snap="${i}">use</button></div>`).join('')
      : '<p class="note">None yet. One is kept automatically each time the setup changes.</p>'}

    <label class="f">Backup file</label>
    <div class="row">
      <button class="btn ghost" id="expCfg">Save a backup</button>
      <button class="btn ghost" id="impCfg">Load a backup</button>
    </div>
    <input type="file" accept="application/json" id="impFile" style="display:none">
    <p class="note" style="margin-top:10px">Worth doing once you have it set up the way you want it. The file goes to your phone's downloads and doesn't depend on any of this working.</p>

    <label class="f">On the server</label>
    <button class="btn ghost" id="prevPeek">What was here before?</button>
    <p class="note" id="prevOut" style="margin-top:10px"></p>
    <button class="btn" style="margin-top:12px;background:var(--warn);color:#fff" id="doRestore">Put the previous setup back</button>
    <p class="note" style="margin-top:10px">Every save keeps a copy of what it replaced. This swaps them, so it also undoes itself if you press it twice.</p>
    <button class="btn ghost" style="margin-top:14px" id="pushLocal">Upload this phone's copy instead</button>
    <p class="note" style="margin-top:10px">Use this if your phone still shows the right setup but the server does not.</p>
  </div>`;
    case 'period': return (()=>{
      const pd=(CFG&&CFG.period)||{};
      const log=(pd.log||[]).slice().sort();
      let predicted='';
      if(log.length>=2){
        let gaps=0; for(let i=1;i<log.length;i++){ gaps += (new Date(log[i])-new Date(log[i-1]))/86400000; }
        const avg=Math.round(gaps/(log.length-1));
        const next=new Date(new Date(log[log.length-1]).getTime()+avg*86400000);
        predicted='About every '+avg+' days. Next one around '+next.toLocaleDateString(undefined,{month:'short',day:'numeric'})+'.';
      } else if(pd.startedOn){
        const next=new Date(new Date(pd.startedOn).getTime()+28*86400000);
        predicted='Not enough history to predict yet. If it runs about 28 days, next one around '+next.toLocaleDateString(undefined,{month:'short',day:'numeric'})+'.';
      }
      const hrs=[['0','12am'],['6','6am'],['7','7am'],['8','8am'],['9','9am'],['20','8pm'],['21','9pm'],['22','10pm']];
      return `<div class="panel">
        <h3>Her period</h3>
        <div class="row"><button class="chip" id="sPerActive" aria-pressed="${!!pd.active}" style="${pd.active?'background:var(--miss);color:#fff':''}">${pd.active?'On right now':'Off'}</button></div>
        <p class="note" style="margin-top:10px">${pd.active
          ? 'Reminders to change her pad are on.'+(pd.startedOn?' Started '+new Date(pd.startedOn).toLocaleDateString(undefined,{month:'short',day:'numeric'})+'.':'')
          : 'Turn this on when her period starts. Turn it off when it ends. The start date is remembered so it can learn her cycle.'}</p>
        ${predicted?`<p class="note" style="margin-top:6px">${predicted}</p>`:''}
      </div>

      <div class="panel">
        <h3>How often</h3>
        <label class="f">Remind her to change every</label>
        <select id="sPerEvery">
          ${[2,3,4].map(n=>`<option value="${n}" ${(pd.everyHours||3)===n?'selected':''}>${n} hours</option>`).join('')}
        </select>
        <label class="f">Only between</label>
        <div class="row">
          <select id="sPerFrom">${hrs.map(([v,l])=>`<option value="${v}" ${String(pd.fromHour??8)===v?'selected':''}>${l}</option>`).join('')}</select>
          <select id="sPerTo">${hrs.map(([v,l])=>`<option value="${v}" ${String(pd.toHour??21)===v?'selected':''}>${l}</option>`).join('')}</select>
        </div>
        <p class="note" style="margin-top:8px">She won't be woken at night. The reminder waits inside these hours.</p>
        <div class="row" style="margin-top:14px"><button class="chip" id="sPerSteps" aria-pressed="${pd.useSteps!==false}">${pd.useSteps!==false?'Walk her through the steps':'Just remind, no steps'}</button></div>
        <button class="btn" style="margin-top:16px" id="savePeriod">Save</button>
      </div>

      <div class="panel">
        <h3>The steps she sees</h3>
        ${(pd.steps||[]).map(st=>`<div class="trow"><div class="tico">${st.photo?`<img src="${st.photo}">`:icoHTML(st.icon)}</div>
          <div class="tmain"><div class="tname">${esc(st.label)}</div></div></div>`).join('') || '<div class="empty">No steps set.</div>'}
        <p class="note" style="margin-top:12px">On her screen this reads plainly and is spoken to her. Nothing on the lock screen or the day-service tablet spells it out, so it stays private.</p>
      </div>`;
    })();
    default: return '';
  }
}

function sectionShell(title, menuHTML){
  const el=document.getElementById('view');
  if(!secKey){ el.innerHTML = menuHTML; return; }
  const TITLES={day:'Things she does', plan:'What’s happening', say:'Things she can say', rewards:'Rewards', clothes:'Clothes and weather', gentle:'Reminders and voice', people:'People', phone:'This phone', advanced:'Advanced'};
  el.innerHTML = `<button class="btn ghost" style="margin-bottom:16px;width:auto;padding:11px 16px" id="secBack">‹ &nbsp;${title}</button>
    <h2 style="font-family:'Bricolage Grotesque',sans-serif;font-size:23px;margin:0 0 16px">${TITLES[secKey]||''}</h2>
    ${secBody()}`;
}

function anyEditorOpen(){
  if(sub==='task'){ editTask(); return true; }
  if(sub==='contact'){ editContact(); return true; }
  if(sub==='phrase'){ editPhrase(); return true; }
  if(sub==='ward'){ editWard(); return true; }
  if(sub==='event'){ editEvent(); return true; }
  if(sub==='reward'){ editReward(); return true; }
  return false;
}

let draft=null;
function editTask(){
  const t=draft;
  document.getElementById('view').innerHTML=`
  <div class="panel"><h3>${t._new?'New task':'Edit task'}</h3>

    <div class="row" style="align-items:center">

      <div style="flex:1"><button class="btn ghost" id="dPhoto">Use a photo</button>
      ${t.photo?`<button class="btn ghost" style="margin-top:8px" id="dNoPhoto">Remove photo</button>`:''}</div>

    <input type="file" accept="image/*" id="dFile" style="display:none">

    <label class="f">How often</label>
    <div class="row">
      <button class="chip" id="fD" aria-pressed="${t.freq==='daily'}">Every day</button>
      <button class="chip" id="fW" aria-pressed="${t.freq==='weekly'}">Certain days</button>
      <button class="chip" id="fO" aria-pressed="${t.freq==='once'}">Just once</button>
    </div>
    <div id="dDays" class="${t.freq==='weekly'?'':'hide'}">
      <label class="f">Which days</label>
      <div class="row" style="gap:4px">${D3.map((d,i)=>`<button class="chip" style="padding:11px 2px" data-day="${i}" aria-pressed="${(t.days||[]).includes(i)}">${d[0]}</button>`).join('')}</div>
    </div>
    <div id="dOnce" class="${t.freq==='once'?'':'hide'}">
      <label class="f">Which day</label>
      <input type="date" id="dDate" value="${t.date||new Date().toISOString().slice(0,10)}">
      <p class="note" style="margin-top:8px">Shows on that day and stays on her list until she does it, then it's gone. Good for one-off things like putting laundry away or tidying her room.</p>
    </div>
    <label class="f">What time</label>
    <input type="time" id="dTime" value="${t.time}">
    <label class="f">Timer</label>
    <select id="dTimer">
      ${[[0,'No timer — just check it off'],[30,'30 seconds'],[60,'1 minute'],[120,'2 minutes'],[180,'3 minutes'],[300,'5 minutes'],[600,'10 minutes'],[900,'15 minutes'],[1200,'20 minutes']]
        .map(([v,l])=>`<option value="${v}" ${(t.timer||0)===v?'selected':''}>${l}</option>`).join('')}
    </select>
    <label class="f">Heads-up before it starts</label>

function shrink(file,cb){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ const img=new Image(); img.onload=()=>{
    const s=Math.min(img.width,img.height), cv=document.createElement('canvas');
    cv.width=cv.height=256;
    cv.getContext('2d').drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,256,256);
    cb(cv.toDataURL('image/jpeg',.72));
  }; img.src=r.result; };
  r.readAsDataURL(file);
}

async function saveConfig(btn){
  if(!API||!HOUSE||!CARE){ alert('Add the worker address, household code, and caregiver key first.'); return false; }

  // A phone that has never downloaded the setup must not be allowed to upload
  // one. This is exactly how a new person joining wiped everybody out.
  if(!loaded){
    const ok = await pull().then(()=>loaded).catch(()=>false);
    if(!ok){
      alert('Still downloading the current setup — nothing was saved.\n\nGive it a moment and try again. This is deliberate: it stops a phone that has not caught up yet from overwriting everyone.');
      return false;
    }
  }
  const label = btn ? btn.textContent : null;
  if(btn){ btn.textContent='Saving…'; btn.disabled=true; }
  saving=true;
  try{
    const r=await post('/config',{config:CFG});
    if(r && r.config) CFG=r.config;
    savedAt=(r&&r.updated)||Date.now(); LS.set('savedAt',savedAt);
    LS.set('config',CFG); setConn(true);
    saving=false;
    if(btn){ btn.textContent='Saved ✓'; btn.style.background='var(--ok)'; btn.style.color='#fff'; }
    toast('Saved');
    return true;
  }catch(e){
    saving=false;
    if(btn){ btn.textContent=label; btn.disabled=false; }
    alert(e.message.length>60 ? e.message : 'Could not save: '+e.message+'\n\nNothing was lost — try again.');
    return false;
  }
}

/* Keeps the last few good setups on this phone. Independent of the server,
   so a bad write can always be undone from here. Only setups with people in
   them are kept, so an empty one can never push the good ones out. */
function snapshot(cfg, at){
  try{
    const snaps=LS.get('snaps',[]);
    const stamp=at||Date.now();
    if(snaps.some(s=>s.at===stamp)) return;
    snaps.unshift({at:stamp, people:(cfg.contacts||[]).length, tasks:(cfg.tasks||[]).length, cfg});
    LS.set('snaps', snaps.slice(0,5));
  }catch(e){}
}

function toast(msg){
  let el=document.getElementById('toast');
  if(!el){ el=document.createElement('div'); el.id='toast';
    el.style.cssText='position:fixed;left:50%;transform:translateX(-50%);bottom:96px;background:var(--ok);color:#fff;'+
      'padding:13px 22px;border-radius:22px;font-weight:800;z-index:90;box-shadow:0 10px 30px rgba(0,0,0,.4)';
    document.body.appendChild(el); }
  el.textContent=msg; el.style.display='block';
  clearTimeout(toast._t); toast._t=setTimeout(()=>{ el.style.display='none'; }, 1800);
}

/* ---------- events ---------- */
document.addEventListener('click',async e=>{
  const t=e.target;
  const tb=t.closest('[data-tab]');
  if(tb){ tab=tb.dataset.tab; sub=null; secKey=null; render(); if(tab==='msgs'){ const ids=MSGS.filter(m=>(m.dir==='out'||m.dir==='alert')&&!m.seen).map(m=>m.id); if(ids.length) post('/seen',{ids}).then(pull).catch(()=>{}); } return; }

  if(t.id==='saveConn'){
    API=document.getElementById('sApi').value.trim();
    HOUSE=document.getElementById('sHouse').value.trim();
    CARE=document.getElementById('sCare').value.trim();
    LS.set('api',API); LS.set('house',HOUSE); LS.set('care',CARE);
    // Download before deciding anything. Only a genuinely empty household
    // gets seeded with the starter setup.
    t.textContent='Connecting…';
    await pull();
    if(loaded && CFG){
      t.textContent='Connected ✓'; toast('Connected'); setTimeout(render,600);
      return;
    }
    if(!confirm('No setup was found for this household code.\n\nCreate a new one? If you expected to join an existing setup, check the household code and worker address instead — creating a new one here is how existing setups get lost.')){
      t.textContent='Save and connect'; return;
    }
    CFG=blank();
    if(await saveConfig(t)) await pull();
    return;
  }
  if(t.id==='saveName'){
    CFG=CFG||blank();
    CFG.name=document.getElementById('sName').value.trim();
    CFG.ntfy=document.getElementById('sNtfy').value.trim();
    CFG.speechRate=parseFloat(document.getElementById('sRate').value);
    CFG.keepDays=+document.getElementById('sKeep').value||0;
    await saveConfig(t); return;
  }
  if(t.id==='saveMe'){ ME=document.getElementById('sMe').value; LS.set('me',ME); subscribePush(); render(); return; }
  const ak=t.closest('[data-ack]');
  if(ak){ try{ await post('/ack',{id:+ak.dataset.ack, me:ME||'Someone'}); await pull(); }catch(e){ alert(e.message); } return; }
  if(t.id==='sWhole'){
    CFG=CFG||blank(); CFG.showWholeDay=!CFG.showWholeDay;
    t.setAttribute('aria-pressed',CFG.showWholeDay);
    t.textContent=CFG.showWholeDay?'The whole day at once':'Only what it is time for';
    return;
  }
  if(t.id==='saveWhole'){ await saveConfig(t); return; }
  if(t.id==='saveRules'){
    CFG=CFG||blank();
    CFG.snoozeMinutes=+document.getElementById('sSnooze').value;
    CFG.maxSnoozes=+document.getElementById('sMax').value;
    CFG.helpFallbackMinutes=+document.getElementById('sFallback').value;
    CFG.nudgeTo=document.getElementById('sNudge').value;
    await saveConfig(t); return;
  }
  if(t.id==='forceUpdate'){

      if(i>-1) CFG.rewards[i]=rec; else CFG.rewards.push(rec);
    }
    if(sub==='event'){
      CFG.events=CFG.events||[];
      const rec={id:draft.id,title:val,icon:draft.icon,photo:draft.photo,kind:draft.kind||'weekly',
        days:draft.days||[],date:document.getElementById('dDate')?document.getElementById('dDate').value:'',
        from:document.getElementById('dFrom').value,to:document.getElementById('dTo').value,
        warn:+document.getElementById('dEWarn').value,items:draft.items||[],big:!!draft.big,away:!!draft.away};
      const i=CFG.events.findIndex(x=>x.id===draft.id);
      if(i>-1) CFG.events[i]=rec; else CFG.events.push(rec);
    }
    if(sub==='ward'){
      CFG.wardrobe=CFG.wardrobe||[];
      const rec={id:draft.id,name:val,icon:draft.icon,photo:draft.photo,
        layer:document.getElementById('dLayer').value,
        minF:parseInt(document.getElementById('dMin').value,10)||0,
        maxF:parseInt(document.getElementById('dMax').value,10)||120,
        rain:!!draft.rain};
      const i=CFG.wardrobe.findIndex(x=>x.id===draft.id);
      if(i>-1) CFG.wardrobe[i]=rec; else CFG.wardrobe.push(rec);
    }
    if(sub==='phrase'){
      const rec={id:draft.id,text:val,icon:draft.icon,kind:draft.kind||'need',for:draft.for||[]};
      const i=CFG.phrases.findIndex(x=>x.id===draft.id);
      if(i>-1) CFG.phrases[i]=rec; else CFG.phrases.push(rec);
    }
    if(await saveConfig(t)){ sub=null; draft=null; setTimeout(render,450); }
    return;
  }
  if(t.id==='dDel'){
    if(sub==='task') CFG.tasks=CFG.tasks.filter(x=>x.id!==draft.id);
    if(sub==='contact') CFG.contacts=CFG.contacts.filter(x=>x.id!==draft.id);
    if(sub==='phrase') CFG.phrases=CFG.phrases.filter(x=>x.id!==draft.id);
    if(sub==='ward') CFG.wardrobe=CFG.wardrobe.filter(x=>x.id!==draft.id);
    if(sub==='event') CFG.events=CFG.events.filter(x=>x.id!==draft.id);
    if(sub==='reward') CFG.rewards=CFG.rewards.filter(x=>x.id!==draft.id);
    if(await saveConfig(t)){ sub=null; draft=null; setTimeout(render,450); }
    return;
  }
});

/* Once the box is left alone, catch up on anything the refresh held back. */
document.addEventListener('focusout',e=>{

document.addEventListener('change',e=>{

    const r=new FileReader();
    r.onload=async()=>{
      try{
        const cfg=JSON.parse(r.result);
        if(!cfg || typeof cfg!=='object') throw new Error('That file is not a backup.');
        if(!confirm('Load this backup? '+((cfg.contacts||[]).length)+' people, '+((cfg.tasks||[]).length)+' tasks.')) return;
        CFG=cfg; loaded=true;
        const res=await post('/config',{config:CFG,force:true});
        savedAt=(res&&res.updated)||Date.now(); LS.set('savedAt',savedAt); LS.set('config',CFG);
        toast('Backup loaded'); render();
      }catch(err){ alert('Could not load that file: '+err.message); }

    shrink(e.target.files[0],d=>{ draft.photo=d; document.getElementById('dPrev').innerHTML=`<img src="${d}">`; });
  }
});

/* ---------- video calling ---------- */
let pc=null,localStream=null,side='a',since=0,poll=null;
async function sig(kind,payload){ try{ await post('/signal',{room,side,kind,payload:JSON.stringify(payload||null)}); }catch(e){} }

function callShell(state){
  document.getElementById('callwrap').innerHTML=`
    <div class="far"><video id="vFar" autoplay playsinline></video></div>
    <div class="near"><video id="vNear" autoplay playsinline muted></video></div>
    ${state?`<div class="st">${state}</div>`:''}
    <div class="bar"><button class="hang" id="cHang">End call</button></div>`;
  document.getElementById('callwrap').classList.remove('hide');
  if(localStream) document.getElementById('vNear').srcObject=localStream;
}

const beginCall = () => startCall('r'+Date.now()+Math.random().toString(36).slice(2,6), 'a');

async function startCall(rm, sd){
  room=rm; side=sd||'a'; since=0;
  callShell(side==='a'?'Ringing…':'Connecting…');
  try{ localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true}); }
  catch(e){ alert('Could not open your camera or microphone.\n\n'+e.name+': '+e.message); return hangUp(); }
  document.getElementById('vNear').srcObject=localStream;

  const ice=(CFG&&CFG.turn&&CFG.turn.urls)
    ? [{urls:'stun:stun.l.google.com:19302'},CFG.turn]
    : [{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}];
  pc=new RTCPeerConnection({iceServers:ice});
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.ontrack=e=>{ const f=document.getElementById('vFar'); if(f&&f.srcObject!==e.streams[0]){ callShell(''); document.getElementById('vFar').srcObject=e.streams[0]; document.getElementById('vNear').srcObject=localStream; } };
  pc.onicecandidate=e=>{ if(e.candidate) sig('ice',e.candidate); };
  pc.onconnectionstatechange=()=>{ if(['failed','closed','disconnected'].includes(pc.connectionState)) hangUp(); };

  if(side==='a'){
    const offer=await pc.createOffer(); await pc.setLocalDescription(offer);
    await sig('offer',offer);
    await post('/call',{room,from:ME||'Someone',to:'__tablet__'}).catch(()=>{});
  }
  poll=setInterval(async()=>{
    if(!room||!pc) return;
    try{
      const r=await fetch(API.replace(/\/$/,'')+'/signal?house='+encodeURIComponent(HOUSE)+'&room='+encodeURIComponent(room)+'&since='+since);
      const d=await r.json();
      for(const it of (d.items||[])){
        since=Math.max(since,it.id);
        if(it.side===side) continue;
        const p=JSON.parse(it.payload||'null');
        if(it.kind==='offer'){
          await pc.setRemoteDescription(p);
          const ans=await pc.createAnswer(); await pc.setLocalDescription(ans);
          await sig('answer',ans);
        }
        else if(it.kind==='answer'&&!pc.currentRemoteDescription) await pc.setRemoteDescription(p);
        else if(it.kind==='ice'&&p){ try{ await pc.addIceCandidate(p); }catch(e){} }
        else if(it.kind==='end') hangUp();
      }
    }catch(e){}
  },1200);
}

function hangUp(){
  if(room) sig('end',null);
  clearInterval(poll); poll=null;
  if(pc){ try{pc.close();}catch(e){} pc=null; }
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  room=null;
  const w=document.getElementById('callwrap'); w.classList.add('hide'); w.innerHTML='';
}

/* ---- Web Push subscription ----
   Notifications come straight from the app through the browser's own push
   service, so there's no second app to keep alive. Tied to which caregiver
   this phone is, so re-subscribe if that changes. */
const VAPID_PUBLIC='BHA-7JKE7UorEGzriIvV5M0SWXHf-xaddmBzuip7_GpVuMVc1eoXDPoKJAtUmYqNsT9hhvQBZqGUZrDowk1SByo';
function _vapidBytes(b64){
  const pad='='.repeat((4-b64.length%4)%4);
  const s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(s); const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) out[i]=raw.charCodeAt(i);
  return out;
}
async function subscribePush(){
  try{
    if(!('serviceWorker' in navigator) || !('PushManager' in window)) return false;
    if(!ME || !API || !HOUSE || !CARE) return false;
    if(Notification.permission==='denied') return false;
    if(Notification.permission!=='granted'){
      const p=await Notification.requestPermission();
      if(p!=='granted') return false;
    }
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub){
      sub=await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:_vapidBytes(VAPID_PUBLIC) });
    }
    await post('/subscribe', { person:ME, sub:sub.toJSON() });
    LS.set('pushPerson', ME);
    return true;
  }catch(e){ return false; }
}
